services:
  - type: web
    name: attendance-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
    rootDirectory: server

databases:
  - name: attendance-db
    plan: free
