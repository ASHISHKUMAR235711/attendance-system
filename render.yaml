version: "1"
databases:
  - name: attendance-db
    plan: free
services:
  - type: web
    name: attendance-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: internalConnectionString
    rootDirectory: server
